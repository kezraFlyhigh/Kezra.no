name: Deploy to One.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.SFTP_USERNAME }}","${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_HOST }} <<'EOF'
          set sftp:auto-confirm yes
          set net:timeout 15
          mirror -R --exclude=.git/ --exclude=.github/ --exclude=server.js . /www/
          quit
          EOF
